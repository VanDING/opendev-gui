<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme Preview — opendev-gui</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--color-surface-primary);
    color: var(--color-content-primary);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .app { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

  .header {
    margin-bottom: 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 1.25rem; font-weight: 700; }
  .header .active-badge {
    font-size: 0.6875rem; padding: 0.25rem 0.5rem;
    border-radius: var(--radius-md);
    background: var(--color-accent-primary-muted);
    color: var(--color-accent-primary);
  }
  .header-actions { display: flex; gap: 0.5rem; align-items: center; }

  /* ── Theme Card Grid ── */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .theme-card {
    cursor: pointer;
    border-radius: var(--radius-lg);
    border: 2px solid transparent;
    padding: 0.625rem;
    text-align: left;
    transition: all 0.15s ease;
    background: var(--color-surface-elevated);
    position: relative;
    font-family: inherit;
    color: inherit;
  }
  .theme-card:hover { border-color: var(--color-border-default); }
  .theme-card.active {
    border-color: var(--color-accent-primary);
    box-shadow: 0 0 0 1px var(--color-accent-primary-muted);
  }
  .theme-card.active::after {
    content: '';
    position: absolute; top: 0.5rem; right: 0.5rem;
    width: 0.5rem; height: 0.5rem;
    border-radius: 50%;
    background: var(--color-accent-primary);
  }
  .theme-card-name {
    font-size: 0.6875rem; font-weight: 600;
    margin-bottom: 0.375rem;
  }

  /* Mini preview inside card */
  .mini-preview {
    border-radius: var(--radius-md);
    overflow: hidden;
    padding: 0.375rem;
  }
  .mini-header {
    display: flex; align-items: center; gap: 0.25rem;
    padding: 0.125rem 0.25rem; margin-bottom: 0.25rem;
    border-radius: var(--radius-sm);
    font-size: 0.4375rem; font-weight: 600;
  }
  .mini-buttons { display: flex; gap: 0.1875rem; margin-bottom: 0.25rem; }
  .mini-btn {
    padding: 0.125rem 0.25rem; font-size: 0.375rem; font-weight: 500;
    border-radius: var(--radius-sm);
  }
  .mini-card {
    padding: 0.25rem; margin-bottom: 0.25rem;
    border-radius: var(--radius-sm);
    border: 1px solid;
  }
  .mini-card-title { font-size: 0.4375rem; font-weight: 600; }
  .mini-card-sub { font-size: 0.375rem; }
  .mini-tags { display: flex; gap: 0.1875rem; }
  .mini-tag {
    padding: 0.0625rem 0.1875rem; font-size: 0.3125rem;
    border-radius: var(--radius-sm);
  }

  /* ── Composite Preview ── */
  .composite {
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border-default);
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .composite-toolbar {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--color-border-subtle);
    font-size: 0.75rem;
  }
  .composite-toolbar .dot-group { display: flex; gap: 0.25rem; }
  .composite-toolbar .dot {
    width: 0.5rem; height: 0.5rem; border-radius: 50%;
  }
  .composite-toolbar .title {
    font-weight: 600; font-size: 0.75rem;
    margin-left: 0.5rem;
  }

  .composite-body {
    display: flex;
    min-height: 320px;
  }

  /* Sidebar */
  .comp-sidebar {
    width: 200px; flex-shrink: 0;
    border-right: 1px solid var(--color-border-subtle);
    padding: 0.5rem;
  }
  .comp-sidebar-item {
    display: flex; align-items: center; gap: 0.375rem;
    padding: 0.375rem 0.5rem;
    border-radius: var(--radius-md);
    font-size: 0.75rem;
    margin-bottom: 0.125rem;
    cursor: default;
  }
  .comp-sidebar-item.active {
    background: var(--color-accent-primary-muted);
    color: var(--color-accent-primary);
  }
  .comp-sidebar-item .icon-placeholder {
    width: 1rem; height: 1rem; border-radius: var(--radius-sm);
    flex-shrink: 0;
  }

  /* Main chat area */
  .comp-chat {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .comp-chat-header {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--color-border-subtle);
    font-size: 0.6875rem; font-weight: 600;
  }
  .comp-messages {
    flex: 1; padding: 0.75rem; overflow-y: auto;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .comp-msg {
    max-width: 80%; padding: 0.5rem 0.625rem;
    border-radius: var(--radius-md);
    font-size: 0.6875rem; line-height: 1.4;
  }
  .comp-msg.user {
    align-self: flex-end;
    background: var(--color-accent-primary);
    color: var(--color-accent-primary-fg);
    border-bottom-right-radius: var(--radius-sm);
  }
  .comp-msg.assistant {
    align-self: flex-start;
    background: var(--color-surface-2);
    border: 1px solid var(--color-border-subtle);
    border-bottom-left-radius: var(--radius-sm);
  }
  .comp-msg .code-inline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.625rem;
    padding: 0.0625rem 0.25rem;
    border-radius: var(--radius-sm);
    background: var(--color-code-inline-bg);
    color: var(--color-code-inline-text);
  }

  /* Code block in preview */
  .comp-code-block {
    margin: 0.375rem 0;
    padding: 0.375rem 0.5rem;
    border-radius: var(--radius-sm);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5625rem;
    line-height: 1.5;
    overflow-x: auto;
  }
  .comp-code-line { display: flex; }
  .comp-code-line .ln { width: 1.5rem; opacity: 0.4; flex-shrink: 0; }
  .kw { color: var(--color-syntax-keyword); }
  .st { color: var(--color-syntax-string); }
  .cm { color: var(--color-syntax-comment); }
  .fn { color: var(--color-syntax-function); }
  .nb { color: var(--color-syntax-number); }
  .op { color: var(--color-syntax-operator); }

  /* Chat input bar */
  .comp-input-bar {
    display: flex; gap: 0.375rem; align-items: center;
    padding: 0.5rem 0.75rem;
    border-top: 1px solid var(--color-border-subtle);
  }
  .comp-input {
    flex: 1; border: none; outline: none;
    padding: 0.375rem 0.5rem;
    border-radius: var(--radius-md);
    font-size: 0.6875rem;
  }
  .comp-send-btn {
    width: 1.75rem; height: 1.75rem; border: none; border-radius: var(--radius-md);
    cursor: default;
    display: flex; align-items: center; justify-content: center;
  }

  /* Intents row in preview */
  .comp-intents {
    display: flex; gap: 0.25rem; flex-wrap: wrap; align-items: center;
    padding: 0.375rem 0.75rem 0.5rem;
    border-top: 1px solid var(--color-border-subtle);
  }
  .comp-intent-badge {
    padding: 0.125rem 0.375rem;
    border-radius: var(--radius-sm);
    font-size: 0.5625rem; font-weight: 500;
  }
  .comp-intent-badge.success { background: var(--color-intent-success-muted); color: var(--color-intent-success); }
  .comp-intent-badge.danger { background: var(--color-intent-danger-muted); color: var(--color-intent-danger); }
  .comp-intent-badge.warning { background: var(--color-intent-warning-muted); color: var(--color-intent-warning); }
  .comp-intent-badge.info { background: var(--color-intent-info-muted); color: var(--color-intent-info); }
  .comp-intent-badge.purple { background: var(--color-intent-purple-muted); color: var(--color-intent-purple); }

  /* ── Token Details ── */
  .token-toggle {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border-default);
    cursor: pointer;
    font-size: 0.8125rem; font-weight: 600;
    background: var(--color-surface-elevated);
    color: var(--color-content-primary);
    font-family: inherit;
    width: 100%;
    transition: all 0.15s ease;
    margin-bottom: 0.75rem;
  }
  .token-toggle:hover { border-color: var(--color-border-emphasis); }
  .token-toggle .arrow {
    transition: transform 0.2s ease;
    font-size: 0.75rem;
  }
  .token-toggle.open .arrow { transform: rotate(90deg); }
  .token-toggle .count {
    font-size: 0.6875rem; font-weight: 400;
    color: var(--color-content-tertiary); margin-left: auto;
  }

  .token-panel { display: none; }
  .token-panel.open { display: block; }

  .section {
    margin-bottom: 1.5rem;
  }
  .section-title {
    font-size: 0.75rem; font-weight: 600;
    color: var(--color-content-secondary);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 0.625rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .section-title .cat-count {
    font-size: 0.625rem; font-weight: 400;
    color: var(--color-content-tertiary);
    text-transform: none; letter-spacing: normal;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.5rem;
  }

  .swatch {
    display: flex; flex-direction: column;
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--color-border-subtle);
    background: var(--color-surface-elevated);
    transition: transform 0.15s ease;
  }
  .swatch:hover { transform: translateY(-1px); }
  .swatch-color {
    height: 44px;
    display: flex; align-items: flex-end; justify-content: flex-end;
    padding: 0.25rem;
    position: relative;
  }
  .swatch-color .hex-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    padding: 0.0625rem 0.25rem;
    border-radius: 3px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    backdrop-filter: blur(4px);
  }
  .swatch-info { padding: 0.3125rem 0.5rem; }
  .swatch-name {
    font-size: 0.625rem; font-weight: 600;
    word-break: break-all;
    margin-bottom: 0.0625rem;
  }
  .swatch-value {
    font-size: 0.5625rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--color-content-tertiary);
    word-break: break-all;
  }

  .global-section { opacity: 0.65; }

</head>

Show globals</label></div></div>

<span class="arrow">▶</span>
Token Details
