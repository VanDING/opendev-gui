# cargo-deny configuration for OpenDev Desktop
# Schema version: cargo-deny 0.19.x
# Run locally: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

# ── Advisories (RUSTSEC vulnerability database) ─────────────────
# Defaults in 0.19+: vulnerability=deny, all others=warn
[advisories]
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # GTK3 transitive deps from Tauri — cannot remove until Tauri 3.x migrates to GTK4
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # Transitive unmaintained deps not under our control
    "RUSTSEC-2024-0370", # proc-macro-error
    "RUSTSEC-2025-0134", # rustls-pemfile
    "RUSTSEC-2025-0141", # bincode
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
    "RUSTSEC-2026-0173", # proc-macro-error2
    # hickory-proto 0.25.2 transitive via microsandbox → opendev-sandbox
    "RUSTSEC-2026-0118", # NSEC3 validation loop
    "RUSTSEC-2026-0119", # O(n^2) name compression
]

# ── Licenses ────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "Zlib",
    "CC0-1.0",
]

# ── Bans (disallowed / duplicate dependencies) ──────────────────
# Note: openssl-sys is NOT banned here because:
# - reqwest is already configured with rustls (not native-tls)
# - The only source is the optional `otlp` feature (opentelemetry-otlp → tonic)
# - That feature is opt-in, not default
[bans]
multiple-versions = "warn"
highlight = "all"

# ── Sources ─────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
