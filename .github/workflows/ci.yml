name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format check ──────────────────────────────────────────────
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Clippy ────────────────────────────────────────────────────
  # Still report-only while we chip away at ~40 pre-existing warnings
  # across opendev-config, opendev-channels, opendev-tools-core,
  # opendev-history, opendev-http, and opendev-mcp.
  # Flip to non-continue once the codebase is clean.
  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        continue-on-error: true

  # ── Tests ─────────────────────────────────────────────────────
  # FIXME: Flaky on CI — some Linux-specific test failures without
  # actionable log output. Re-enable blocking once root-caused.
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features
        continue-on-error: true

  # ── Security audit (cargo-deny already covers advisories) ──────
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ── Dependency license & duplicate check ──────────────────────
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
          manifest-path: Cargo.toml
